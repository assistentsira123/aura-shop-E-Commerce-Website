<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart — AURA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="cart.css">
<link rel="stylesheet" href="footer.css">
</head>
<body>

<div id="site-header"></div>

<main class="cart-page">
  <div class="container">
    <div class="section-head" style="margin-bottom: var(--sp-6);">
      <span class="eyebrow">Cart</span>
      <h2 style="font-size:var(--fs-h2);">Your bag</h2>
    </div>

    <div id="cartContent"></div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/products-data.js"></script>
<script src="js/cart-store.js"></script>
<script src="js/layout.js"></script>
<script src="js/product-card.js"></script>
<script>
  renderHeader('shop');
  renderFooter();

  const SHIPPING_FLAT = 8;
  const FREE_SHIPPING_THRESHOLD = 150;

  function qtyStepperHtml(id, qty, stock) {
    return `
      <div class="cart-line__qty">
        <div class="qty-stepper">
          <button type="button" data-qty-minus="${id}" aria-label="Decrease quantity">−</button>
          <span>${qty}</span>
          <button type="button" data-qty-plus="${id}" aria-label="Increase quantity" ${qty >= stock ? 'disabled' : ''}>+</button>
        </div>
        <button type="button" class="cart-line__remove" data-remove="${id}">Remove</button>
      </div>
    `;
  }

  function renderCart() {
    const lines = CartStore.lines();
    const container = document.getElementById('cartContent');

    if (lines.length === 0) {
      container.innerHTML = `
        <div class="card cart-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 002-1.6L23 6H6"/></svg>
          <p>Your cart is empty.</p>
          <a href="shop.html" class="btn btn--primary">Start shopping</a>
        </div>
      `;
      return;
    }

    const subtotal = CartStore.subtotal();
    const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FLAT;
    const total = subtotal + shipping;

    container.innerHTML = `
      <div class="cart-grid">
        <div class="cart-list">
          ${lines.map((l) => `
            <div class="card cart-line" data-line="${l.product.id}">
              <div class="cart-line__media">${productIconSvg(l.product.color)}</div>
              <div>
                <p class="cart-line__name"><a href="product.html?id=${l.product.id}">${l.product.name}</a></p>
                <p class="cart-line__unit">${formatPrice(l.product.price)} each</p>
              </div>
              ${qtyStepperHtml(l.product.id, l.qty, l.product.stock)}
              <p class="cart-line__total">${formatPrice(l.lineTotal)}</p>
            </div>
          `).join('')}
        </div>

        <aside class="card cart-summary">
          <h3>Order summary</h3>
          <div class="cart-summary__row"><span>Subtotal</span><span>${formatPrice(subtotal)}</span></div>
          <div class="cart-summary__row"><span>Shipping</span><span>${shipping === 0 ? 'Free' : formatPrice(shipping)}</span></div>
          ${shipping > 0 ? `<div class="cart-summary__row"><span></span><span class="text-muted" style="font-size:0.78rem;">Free shipping over ${formatPrice(FREE_SHIPPING_THRESHOLD)}</span></div>` : ''}
          <div class="cart-summary__row total"><span>Total</span><span>${formatPrice(total)}</span></div>
          <a href="checkout.html" class="btn btn--primary btn--block">Proceed to checkout</a>
          <a href="shop.html" class="btn btn--ghost btn--block" style="margin-top: var(--sp-2);">Continue shopping</a>
        </aside>
      </div>
    `;

    container.querySelectorAll('[data-qty-plus]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-qty-plus');
        const line = CartStore.lines().find((l) => l.product.id === id);
        if (line) CartStore.setQty(id, line.qty + 1);
      });
    });
    container.querySelectorAll('[data-qty-minus]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-qty-minus');
        const line = CartStore.lines().find((l) => l.product.id === id);
        if (line) CartStore.setQty(id, line.qty - 1);
      });
    });
    container.querySelectorAll('[data-remove]').forEach((btn) => {
      btn.addEventListener('click', () => CartStore.remove(btn.getAttribute('data-remove')));
    });
  }

  window.addEventListener('cart:updated', renderCart);
  renderCart();
</script>
</body>
</html>
